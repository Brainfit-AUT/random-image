<!DOCTYPE html>
<html>
<head>
  <title>Zufallsbild</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      max-width: 100%;
      max-height: 100%;

</head>
<body>

<img id="img">

<script>

  "https://github.com/Brainfit-AUT/random-image/blob/main/Kopie%20von%20Aufgabe1.png?raw=truev=1",
  "https://github.com/Brainfit-AUT/random-image/blob/main/Kopie%20von%20Kopie%20von%20Aufgabe1%20(1).png?raw=truev=1",
  "https://github.com/Brainfit-AUT/random-image/blob/main/Kopie%20von%20Kopie%20von%20Aufgabe1.png?raw=truev=1"
];

const random = images[Math.floor(Math.random() * images.length)];
document.getElementById("img").src = random;
</script>

</body>
</html>
