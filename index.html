<!DOCTYPE html>
<html>
<head>
  <title>Zufallsbild</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>

<img id="img">

<script>
const images = [
  "Kopie von Aufgabe1 (1).png",
  "Kopie von Aufgabe1.png",
  "Kopie von Kopie von Aufgabe1 (1).png",
  "Kopie von Kopie von Aufgabe1.png"
];

const random = images[Math.floor(Math.random() * images.length)];
document.getElementById("img").src = random;
</script>

</body>
</html>
